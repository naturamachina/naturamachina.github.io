<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NATURA MACHINA</title>
  <style>
    :root {
      --ink: #050505;
      --mist: #8a8a8a;
      --paper: #e6e6e6;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--ink);
      color: var(--paper);
      font-family: "IBM Plex Mono", ui-monospace, monospace;
      -webkit-font-smoothing: antialiased;
    }
    canvas#view {
      display: block;
      width: 100%;
      height: 100%;
    }
    .layer-ui {
      position: fixed;
      inset: 0;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: clamp(1.25rem, 4vw, 2.5rem);
      background: radial-gradient(ellipse 80% 55% at 50% 100%, rgba(10,10,10,0.35) 0%, transparent 62%);
    }
    h1 {
      font-weight: 200;
      font-size: clamp(0.95rem, 2.4vw, 1.35rem);
      letter-spacing: 0.42em;
      text-indent: 0.42em;
      text-transform: uppercase;
      opacity: 0.92;
    }
    p.sub {
      margin-top: 0.65rem;
      max-width: 28rem;
      font-weight: 300;
      font-size: clamp(0.68rem, 1.35vw, 0.78rem);
      letter-spacing: 0.18em;
      color: var(--mist);
      line-height: 1.65;
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@200;300&display=swap" rel="stylesheet" />
</head>
<body>
  <canvas id="view" aria-label="NATURA MACHINA horizon with noise isolines"></canvas>
  <div class="layer-ui">
    <h1>NATURA MACHINA</h1>
    <p class="sub">Nature of the Machine - An artistic collaboration</p>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.170.0/build/three.module.js"
    }
  }
  </script>
  <script type="module">
    import * as THREE from "three";

    const canvas = document.getElementById("view");
    const dpr = Math.min(window.devicePixelRatio || 1, 2);

    const renderer = new THREE.WebGLRenderer({
      canvas,
      antialias: true,
      alpha: false,
      powerPreference: "high-performance",
    });
    renderer.setPixelRatio(dpr);
    renderer.setClearColor(0x030303, 1);
    renderer.setSize(window.innerWidth, window.innerHeight, false);

    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x030303, 0.045);

    const camera = new THREE.PerspectiveCamera(42, window.innerWidth / window.innerHeight, 0.05, 120);
    camera.position.set(0, 1.05, 3.6);
    camera.lookAt(0, 0.55, -6);

    /* —— Water plane: moving isolines from 3D Simplex noise (FBM) —— */
    const waterGeo = new THREE.PlaneGeometry(28, 14, 1, 1);
    const waterUniforms = {
      uTime: { value: 0 },
    };
    const waterMat = new THREE.ShaderMaterial({
      transparent: true,
      depthWrite: false,
      side: THREE.DoubleSide,
      uniforms: waterUniforms,
      vertexShader: `
        varying vec2 vUv;
        varying vec3 vWorld;
        void main() {
          vUv = uv;
          vWorld = (modelMatrix * vec4(position, 1.0)).xyz;
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
      `,
      fragmentShader: `
        precision highp float;
        varying vec2 vUv;
        varying vec3 vWorld;
        uniform float uTime;

        vec3 mod289v3(vec3 x) {
          return x - floor(x * (1.0 / 289.0)) * 289.0;
        }
        vec4 mod289v4(vec4 x) {
          return x - floor(x * (1.0 / 289.0)) * 289.0;
        }
        vec4 permute(vec4 x) { return mod289v4(((x * 34.0) + 10.0) * x); }
        vec4 taylorInvSqrt(vec4 r) { return 1.79284291400159 - 0.85373472095314 * r; }

        float snoise(vec3 v) {
          const vec2 C = vec2(1.0 / 6.0, 1.0 / 3.0);
          const vec4 D = vec4(0.0, 0.5, 1.0, 2.0);
          vec3 i = floor(v + dot(v, C.yyy));
          vec3 x0 = v - i + dot(i, C.xxx);
          vec3 g = step(x0.yzx, x0.xyz);
          vec3 l = 1.0 - g;
          vec3 i1 = min(g.xyz, l.zxy);
          vec3 i2 = max(g.xyz, l.zxy);
          vec3 x1 = x0 - i1 + C.xxx;
          vec3 x2 = x0 - i2 + C.yyy;
          vec3 x3 = x0 - D.yyy;
          i = mod289v3(i);
          vec4 p = permute(permute(permute(
            i.z + vec4(0.0, i1.z, i2.z, 1.0))
            + i.y + vec4(0.0, i1.y, i2.y, 1.0))
            + i.x + vec4(0.0, i1.x, i2.x, 1.0));
          float n_ = 0.142857142857;
          vec3 ns = n_ * D.wyz - D.xzx;
          vec4 j = p - 49.0 * floor(p * ns.z * ns.z);
          vec4 x_ = floor(j * ns.z);
          vec4 y_ = floor(j - 7.0 * x_);
          vec4 x = x_ * ns.x + ns.yyyy;
          vec4 y = y_ * ns.x + ns.yyyy;
          vec4 h = 1.0 - abs(x) - abs(y);
          vec4 b0 = vec4(x.xy, y.xy);
          vec4 b1 = vec4(x.zw, y.zw);
          vec4 s0 = floor(b0) * 2.0 + 1.0;
          vec4 s1 = floor(b1) * 2.0 + 1.0;
          vec4 sh = -step(h, vec4(0.0));
          vec4 a0 = b0.xzyw + s0.xzyw * sh.xxyy;
          vec4 a1 = b1.xzyw + s1.xzyw * sh.zzww;
          vec3 p0 = vec3(a0.xy, h.x);
          vec3 p1 = vec3(a0.zw, h.y);
          vec3 p2 = vec3(a1.xy, h.z);
          vec3 p3 = vec3(a1.zw, h.w);
          vec4 norm = taylorInvSqrt(vec4(dot(p0, p0), dot(p1, p1), dot(p2, p2), dot(p3, p3)));
          p0 *= norm.x;
          p1 *= norm.y;
          p2 *= norm.z;
          p3 *= norm.w;
          vec4 m = max(0.5 - vec4(dot(x0, x0), dot(x1, x1), dot(x2, x2), dot(x3, x3)), 0.0);
          m = m * m;
          return 105.0 * dot(m * m, vec4(dot(p0, x0), dot(p1, x1), dot(p2, x2), dot(p3, x3)));
        }

        float fbm(vec3 p) {
          float v = 0.0;
          float a = 0.5;
          mat3 m = mat3(
            0.00, 0.80, 0.60,
           -0.80, 0.36, -0.48,
           -0.60, -0.48, 0.64);
          for (int i = 0; i < 5; i++) {
            v += a * snoise(p);
            p = m * p * 2.02 + vec3(17.0);
            a *= 0.5;
          }
          return v;
        }

        void main() {
          vec3 flow = vec3(vWorld.x, vWorld.z, vWorld.y) * 0.38;
          flow.x += uTime * 0.055;
          flow.z += uTime * 0.038;
          float n = fbm(flow);
          n = n * 0.5 + 0.5;

          float lineW = 0.028;
          float acc = 0.0;
          for (int i = 1; i < 14; i++) {
            float L = float(i) / 14.0;
            acc += 1.0 - smoothstep(0.0, lineW, abs(n - L));
          }
          acc = clamp(acc, 0.0, 1.0);

          float fade = smoothstep(0.0, 0.05, vUv.y);
          float a = acc * fade * 0.48;
          gl_FragColor = vec4(vec3(a), a);
        }
      `,
    });
    const water = new THREE.Mesh(waterGeo, waterMat);
    water.rotation.x = -Math.PI * 0.5;
    water.position.set(0, 0.02, -2.2);
    scene.add(water);

    /* —— Wireframe ocean grid —— */
    const gridSeg = 48;
    const gridGeo = new THREE.PlaneGeometry(32, 16, gridSeg, gridSeg / 2);
    const gridMat = new THREE.MeshBasicMaterial({
      color: 0xffffff,
      wireframe: true,
      transparent: true,
      opacity: 0.11,
    });
    const grid = new THREE.Mesh(gridGeo, gridMat);
    grid.rotation.x = -Math.PI * 0.5;
    grid.position.set(0, 0, -2.25);
    scene.add(grid);

    /* —— Horizon seam —— */
    const seamGeo = new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(-18, 0.62, -8.2),
      new THREE.Vector3(18, 0.62, -8.2),
    ]);
    const seam = new THREE.Line(
      seamGeo,
      new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.22 }),
    );
    scene.add(seam);

    /* —— Technical skyline (wireframe edges) —— */
    const skyline = new THREE.Group();
    skyline.position.set(0, 0.62, -8.15);
    const edgeMat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.35 });
    const rng = (s) => {
      let x = s;
      return () => {
        x = (x * 1664525 + 1013904223) >>> 0;
        return (x >>> 0) / 0xffffffff;
      };
    };
    const rand = rng(0x4e4154 ^ 0x4d43);

    for (let i = 0; i < 42; i++) {
      const w = 0.08 + rand() * 0.22;
      const h = 0.35 + rand() * 1.85;
      const d = 0.08 + rand() * 0.18;
      const x = (i / 41 - 0.5) * 22 + (rand() - 0.5) * 0.35;
      const box = new THREE.Mesh(new THREE.BoxGeometry(w, h, d));
      box.position.set(x, h * 0.5, (rand() - 0.5) * 0.15);
      const edges = new THREE.LineSegments(new THREE.EdgesGeometry(box.geometry), edgeMat);
      edges.position.copy(box.position);
      skyline.add(edges);
      box.geometry.dispose();
    }

    for (let m = 0; m < 7; m++) {
      const mx = (m / 6 - 0.5) * 14 + (rand() - 0.5);
      const cyl = new THREE.CylinderGeometry(0.01, 0.02, 0.9, 4, 1);
      const e = new THREE.LineSegments(new THREE.EdgesGeometry(cyl), edgeMat);
      e.position.set(mx, 0.45 + rand() * 1.1, 0.05);
      skyline.add(e);
      cyl.dispose();
    }
    scene.add(skyline);

    const clock = new THREE.Clock();

    function onResize() {
      const w = window.innerWidth;
      const h = window.innerHeight;
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
      renderer.setSize(w, h, false);
    }
    window.addEventListener("resize", onResize);

    function tick() {
      requestAnimationFrame(tick);
      waterUniforms.uTime.value = clock.getElapsedTime();
      renderer.render(scene, camera);
    }
    tick();
  </script>
</body>
</html>
